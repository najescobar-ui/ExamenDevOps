spring.application.name=despachos-api
server.port=8081

# Base de datos MySQL (credenciales por variables de entorno)
spring.datasource.url=jdbc:mysql://${DB_ENDPOINT}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Hibernate
spring.jpa.database=mysql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# CORS: origenes permitidos configurables por entorno (restringir en produccion)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# Observabilidad / health checks para ECS + ALB
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html
